services:
  gitlab:
    image: ${GITLAB_IMAGE:-gitlab/gitlab-ce:latest}
    container_name: q-infra-gitlab
    restart: unless-stopped
    hostname: gitlab.local
    ports:
      - "${GITLAB_PORT:-8929}:8929"
      - "${GITLAB_SSH_PORT:-2224}:22"
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
      - ./config/gitlab.rb:/etc/gitlab/gitlab.rb:ro
    environment:
      GITLAB_OMNIBUS_CONFIG: "from_file('/etc/gitlab/gitlab.rb')"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8929/-/readiness"]
      interval: 60s
      timeout: 15s
      retries: 10
      start_period: 300s
    shm_size: "256m"
    networks:
      - q-infra-net
    deploy:
      resources:
        limits:
          memory: ${GITLAB_MEMORY_LIMIT:-4g}

volumes:
  gitlab_config:
    name: q-infra-gitlab-config
  gitlab_logs:
    name: q-infra-gitlab-logs
  gitlab_data:
    name: q-infra-gitlab-data

networks:
  q-infra-net:
    name: ${COMPOSE_NETWORK:-q-infra-net}
    external: false
