# 在文件开头添加
certmanager-issuer:
  email: admin@example.com

# q-infra GitLab overrides - minimal external mode
# All overrides for the upstream gitlab chart live under `gitlab:`.

global:
  hosts:
    gitlab:
      name: gitlab-webservice-default.q-infra.svc.cluster.local
    https: false

gitlab:
  global:
    edition: ce
    hosts:
      domain: localhost
      gitlab:
        name: gitlab-webservice-default.q-infra.svc.cluster.local
      https: false
    initialRootPassword:
      secret: gitlab-root-password
      key: password
    ingress:
      configureCertmanager: false
      apiVersion: "networking.k8s.io/v1"
    shell:
      port: 30022

    # 配置 API 版本以兼容 Kubernetes 1.34+
    pdb:
      apiVersion: "policy/v1"
    hpa:
      apiVersion: "autoscaling/v2"

    # External PostgreSQL (q-infra)
    # Use psql.main.* as per upstream chart expectations
    psql:
      main:
        host: postgresql.q-infra.svc.cluster.local
        port: 5432
        database: gitlabhq_production
        username: postgres
        password:
          secret: gitlab-postgresql-password
          key: password

    # External Redis (q-infra, no auth)
    redis:
      host: redis.q-infra.svc.cluster.local
      port: 6379
      auth:
        enabled: false
      sentinels: []

    # External MinIO (q-infra) for object storage
    minio:
      enabled: false
    appConfig:
      object_store:
        enabled: true
        connection:
          secret: gitlab-objectstore-connection
          key: connection

  # ==== Disable non-core subcharts & infra components ====

  # cert-manager: use new `installCertmanager` flag, certmanager block stays for CRD config only
  installCertmanager: false
  certmanager:
    installCRDs: false
  certmanager-issuer:
    email: admin@example.com

  # prometheus chart
  prometheus:
    install: false

  # redis subchart
  redis:
    install: false

  # postgresql subchart
  postgresql:
    install: false

  # gitlab-runner subchart
  gitlab-runner:
    install: true
    gitlabUrl: "http://gitlab-webservice-default.q-infra.svc.cluster.local:8080"
    runners:
      # 让 runner 直接连集群内的 webservice 默认 service
      config: |
        [[runners]]
          url = "http://gitlab-webservice-default.q-infra.svc.cluster.local:8080"
          {{/* registration-token 会通过 gitlab-runner-secret 注入，这里不写死 */}}
          [runners.kubernetes]
            image = "ubuntu:22.04"

  # minio 由 global.minio.enabled 控制，这里不再使用 chart-local enabled

  # kas & zoekt & openbao 等可以暂时关闭
  kas:
    enabled: false

  gitlab-zoekt:
    enabled: false

  openbao:
    enabled: false

  # Registry 先保留，如果后续仍然触发 1MiB 限制，再考虑关闭
  registry:
    enabled: true

  # ==== Core GitLab components only ====

  gitlab:
    webservice:
      # 关闭 Helm 测试钩子，避免部署时的测试失败
      tests:
        enabled: false
      service:
        type: NodePort
      minReplicas: 1
      maxReplicas: 1
      deployment:
        # 给 webservice 一个 startupProbe，避免冷启动时被 liveness 误杀
        startupProbe:
          httpGet:
            path: /-/readiness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 60
        # 放宽 liveness 探针参数
        livenessProbe:
          initialDelaySeconds: 120
          periodSeconds: 60
          timeoutSeconds: 30
          successThreshold: 1
          failureThreshold: 10
        # readiness 维持较频繁探测
        readinessProbe:
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 5
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi

    sidekiq:
      minReplicas: 1
      maxReplicas: 1
      # 放宽 sidekiq 健康检查，避免冷启动时被误杀
      livenessProbe:
        initialDelaySeconds: 120
        periodSeconds: 60
        timeoutSeconds: 30
        successThreshold: 1
        failureThreshold: 10
      readinessProbe:
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 5
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 4Gi

    gitlab-shell:
      service:
        type: NodePort
        nodePort: 30022
      minReplicas: 1
      maxReplicas: 1

    gitaly:
      persistence:
        size: 1Gi
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
