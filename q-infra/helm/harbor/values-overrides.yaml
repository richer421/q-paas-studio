# Harbor 最小资源配置 - 使用外部中间件
# Chart: harbor/harbor 1.18.2
# 使用方式: helm install harbor ./helm/harbor -f values-overrides.yaml

expose:
  type: nodePort
  tls:
    enabled: false
  nodePort:
    ports:
      http:
        nodePort: 30180
      https:
        nodePort: 30443

externalURL: http://localhost:30180

harborAdminPassword: Harbor12345

# 优化资源配置确保丝滑部署
core:
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  extraEnvVars:
    - name: POSTGRESQL_PORT
      value: "5432"

portal:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

registry:
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

registryctl:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

jobservice:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  extraEnvVars:
    - name: POSTGRESQL_PORT
      value: "5432"

trivy:
  enabled: false

notary:
  enabled: false

# 外部 PostgreSQL 配置 - 连接 q-infra 命名空间的 PostgreSQL
database:
  type: external
  external:
    host: "postgresql.q-infra.svc.cluster.local"
    port: "5432"
    username: "postgres"
    password: "postgres123"
    coreDatabase: "harbor_core"
    notaryServerDatabase: "harbor_notary_server"
    notarySignerDatabase: "harbor_notary_signer"

# 外部 Redis 配置 - 连接 q-infra 命名空间的 Redis
redis:
  type: external
  external:
    addr: "redis.q-infra.svc.cluster.local:6379"
    password: ""

# 持久化存储
persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      size: 10Gi
      storageClass: ""
    chartmuseum:
      size: 5Gi
    trivy:
      size: 5Gi

metrics:
  enabled: false