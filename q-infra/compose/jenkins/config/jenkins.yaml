jenkins:
  systemMessage: "Q-PaaS Studio Jenkins (managed by JCasC)"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-changeme}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "http://localhost:${JENKINS_PORT:-8090}/"

tool:
  git:
    installations:
      - name: Default
        home: git
