# MySQL 最小资源配置 - 覆盖默认 values
# 使用方式: helm install mysql ./helm/mysql -f values-overrides.yaml

image:
  repository: mysql
  tag: "8.0.45-debian"

auth:
  rootPassword: "root123"
  database: "appdb"

# 单节点模式
architecture: standalone

# 最小资源配置
primary:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  persistence:
    enabled: true
    size: 1Gi

# 禁用从节点
secondary:
  replicaCount: 0