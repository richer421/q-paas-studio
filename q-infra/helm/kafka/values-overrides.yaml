# Kafka 配置 - Bitnami Kafka Chart（KRaft 单节点）

image:
  registry: docker.io
  repository: bitnamilegacy/kafka
  tag: latest

listeners:
  client:
    protocol: PLAINTEXT
  controller:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT
  external:
    protocol: PLAINTEXT

controller:
  replicaCount: 1
  controllerOnly: false
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""

broker:
  replicaCount: 0

service:
  type: ClusterIP
  ports:
    client: 9092

externalAccess:
  enabled: true
  controller:
    service:
      type: NodePort
      nodePorts:
        - 30092
      domain: localhost

defaultInitContainers:
  autoDiscovery:
    enabled: false

tls:
  autoGenerated:
    enabled: false
