# PostgreSQL 配置 - groundhog2k/postgres chart
# 使用官方 PostgreSQL 镜像

image:
  registry: "docker.io"
  repository: "postgres"
  tag: "16"
  pullPolicy: IfNotPresent

# 数据库配置
settings:
  superuserPassword:
    value: postgres123

userDatabase:
  name:
    value: appdb
  user:
    value: appuser
  password:
    value: apppass123

# 资源限制 - 优化配置确保丝滑部署
resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# 持久化存储
storage:
  className: ""
  requestedSize: 5Gi

# 单节点模式
replicaCount: 1
