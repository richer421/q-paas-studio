# Jenkins 最小资源配置
# Chart: jenkins/jenkins 5.9.4
# 使用方式: helm install jenkins ./helm/jenkins -f values-overrides.yaml

controller:
  image:
    repository: jenkins/jenkins
    tag: lts-jdk17

  admin:
    username: admin
    password: changeme

  # 优化资源配置，确保丝滑部署
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  serviceType: NodePort
  servicePort: 8080
  nodePort: 30090

  # 本地环境不强制安装额外插件，避免依赖解析失败导致 init 容器崩溃
  # 如需固定插件版本，可以在这里配置；当前设置为完全关闭插件安装逻辑。
  installPlugins: false

  # 关闭默认 JCasC 配置，避免依赖 configuration-as-code 插件
  JCasC:
    defaultConfig: false

# 持久化存储
persistence:
  enabled: true
  size: 5Gi

# Agent 配置
agent:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi