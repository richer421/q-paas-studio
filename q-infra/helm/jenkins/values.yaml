# Jenkins Helm values override
# Chart: jenkinsci/jenkins
# Repo: https://charts.jenkins.io

controller:
  image:
    registry: docker.io
    repository: jenkins/jenkins
    tag: lts-jdk17

  adminUser: admin
  adminPassword: changeme

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  serviceType: ClusterIP
  servicePort: 8080

  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest

  JCasC:
    defaultConfig: true
    configScripts:
      welcome-message: |
        jenkins:
          systemMessage: "Q-PaaS Studio Jenkins (Helm)"

  ingress:
    enabled: false
    # 按需开启 Ingress
    # hostName: jenkins.example.com

persistence:
  enabled: true
  size: 20Gi

agent:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
