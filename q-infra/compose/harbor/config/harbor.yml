# Harbor 核心配置
# 此为简化配置，Harbor 完整安装建议使用官方 installer
_version: "2.11.0"

hostname: localhost
http:
  port: 8880

harbor_admin_password: "${HARBOR_ADMIN_PASSWORD:-Harbor12345}"

database:
  type: postgresql
  internal:
    host: harbor-db
    port: 5432
    username: postgres
    password: "${HARBOR_DB_PASSWORD:-changeme}"

data_volume: /data

storage_service:
  filesystem:
    rootdirectory: /storage
