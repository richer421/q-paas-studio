# Redis 配置 - groundhog2k/redis chart
# 使用官方 Redis 镜像

image:
  registry: "docker.io"
  repository: "redis"
  tag: "7.4"
  pullPolicy: IfNotPresent

# Redis 配置
settings:
  # 禁用持久化（可选，根据需求调整）
  appendonly: "no"

# 资源限制 - 优化配置确保丝滑部署
resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# 持久化存储
storage:
  className: ""
  requestedSize: 1Gi

# 单节点模式
replicaCount: 1
