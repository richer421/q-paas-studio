# Kafka 配置 - Bitnami Kafka Chart（KRaft 单节点）

image:
  registry: docker.io
  repository: bitnamilegacy/kafka
  tag: 4.0.0-debian-12-r10
  digest: sha256:aa0b2aee8c5610dd1d18d48b4f1df0dbe3267b5d4c338d36c9af9cbf0529c0b0

listeners:
  client:
    protocol: PLAINTEXT
  controller:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT
  external:
    protocol: PLAINTEXT

controller:
  replicaCount: 1
  controllerOnly: false
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""

broker:
  replicaCount: 0

service:
  type: ClusterIP
  ports:
    client: 9092

externalAccess:
  enabled: true
  controller:
    service:
      type: NodePort
      nodePorts:
        - 30092
      domain: localhost

defaultInitContainers:
  autoDiscovery:
    enabled: false

tls:
  autoGenerated:
    enabled: false
