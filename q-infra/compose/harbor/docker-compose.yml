services:
  harbor-core:
    image: goharbor/harbor-core:${HARBOR_VERSION:-v2.11.0}
    container_name: q-infra-harbor-core
    restart: unless-stopped
    depends_on:
      harbor-db:
        condition: service_healthy
      harbor-redis:
        condition: service_healthy
      harbor-registry:
        condition: service_started
    volumes:
      - harbor_core_data:/data
      - ./config/harbor.yml:/etc/core/app.conf:ro
    environment:
      - CONFIG_PATH=/etc/core/app.conf
      - CORE_SECRET=q-infra-harbor-secret
      - JOBSERVICE_SECRET=q-infra-jobservice-secret
      - REGISTRY_CREDENTIAL_USERNAME=harbor_registry_user
      - REGISTRY_CREDENTIAL_PASSWORD=harbor_registry_password
    networks:
      - q-infra-net

  harbor-portal:
    image: goharbor/harbor-portal:${HARBOR_VERSION:-v2.11.0}
    container_name: q-infra-harbor-portal
    restart: unless-stopped
    ports:
      - "${HARBOR_PORT:-8880}:8080"
    depends_on:
      - harbor-core
    networks:
      - q-infra-net

  harbor-registry:
    image: goharbor/registry-photon:${HARBOR_VERSION:-v2.11.0}
    container_name: q-infra-harbor-registry
    restart: unless-stopped
    volumes:
      - harbor_registry_data:/storage
    networks:
      - q-infra-net

  harbor-db:
    image: goharbor/harbor-db:${HARBOR_VERSION:-v2.11.0}
    container_name: q-infra-harbor-db
    restart: unless-stopped
    volumes:
      - harbor_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${HARBOR_DB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - q-infra-net

  harbor-redis:
    image: goharbor/redis-photon:${HARBOR_VERSION:-v2.11.0}
    container_name: q-infra-harbor-redis
    restart: unless-stopped
    volumes:
      - harbor_redis_data:/var/lib/redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - q-infra-net

  harbor-jobservice:
    image: goharbor/harbor-jobservice:${HARBOR_VERSION:-v2.11.0}
    container_name: q-infra-harbor-jobservice
    restart: unless-stopped
    depends_on:
      - harbor-core
    environment:
      - CORE_SECRET=q-infra-harbor-secret
      - JOBSERVICE_SECRET=q-infra-jobservice-secret
    networks:
      - q-infra-net

volumes:
  harbor_core_data:
    name: q-infra-harbor-core-data
  harbor_registry_data:
    name: q-infra-harbor-registry-data
  harbor_db_data:
    name: q-infra-harbor-db-data
  harbor_redis_data:
    name: q-infra-harbor-redis-data

networks:
  q-infra-net:
    name: ${COMPOSE_NETWORK:-q-infra-net}
    external: false
