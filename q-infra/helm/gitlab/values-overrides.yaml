# GitLab 最小资源配置 - 使用外部中间件

certmanager-issuer:
  email: admin@example.com

global:
  edition: ce
  hosts:
    domain: localhost
    https: false

  # External PostgreSQL
  psql:
    host: postgresql.q-infra.svc.cluster.local
    port: 5432
    database: gitlabhq_production
    username: postgres
    password:
      secret: gitlab-postgresql-password
      key: password

  # External Redis
  redis:
    host: redis.q-infra.svc.cluster.local
    port: 6379
    auth:
      enabled: false

  # External MinIO
  minio:
    enabled: false
  appConfig:
    object_store:
      enabled: true
      connection:
        secret: gitlab-objectstore-connection
        key: connection

# 禁用内置中间件
postgresql:
  install: false

redis:
  install: false

prometheus:
  install: false

# 禁用非核心组件
gitlab-runner:
  install: false

kas:
  enabled: false

gitlab-zoekt:
  enabled: false

openbao:
  enabled: false

registry:
  enabled: false

installCertmanager: false

# GitLab 核心组件资源配置
gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  gitaly:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  gitlab-exporter:
    enabled: false

  gitlab-pages:
    enabled: false

  mailroom:
    enabled: false
